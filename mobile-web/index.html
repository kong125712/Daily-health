<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#34785f" />
    <title>Daily Health</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f6faf7;
        color: #17211c;
      }

      main {
        width: min(88vw, 360px);
        display: grid;
        gap: 18px;
        justify-items: center;
        text-align: center;
      }

      .mark {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #34785f;
        color: white;
        font-size: 30px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #52645b;
        line-height: 1.6;
      }

      .bar {
        width: 100%;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: #dcece5;
      }

      .bar::before {
        content: "";
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: #34785f;
        animation: loading 1.2s ease-in-out infinite;
      }

      .error {
        display: none;
        border: 1px solid rgba(182, 89, 115, 0.35);
        border-radius: 8px;
        background: rgba(182, 89, 115, 0.1);
        padding: 12px;
        color: #8f314d;
        font-size: 14px;
        font-weight: 700;
      }

      @keyframes loading {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(230%);
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #07120f;
          color: #f8fafc;
        }

        p {
          color: #cbd5e1;
        }

        .bar {
          background: #173229;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">D</div>
      <h1>Daily Health</h1>
      <p id="status">Starting local health server...</p>
      <div class="bar" aria-hidden="true"></div>
      <p id="error" class="error"></p>
    </main>
    <script>
      window.dailyHealthStartupFailed = function dailyHealthStartupFailed(message) {
        document.getElementById("status").textContent = "Local service could not start.";
        const error = document.getElementById("error");
        error.textContent = message;
        error.style.display = "block";
      };
    </script>
  </body>
</html>
