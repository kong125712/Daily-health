name: Deploy Expo Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "server/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.DAILY_HEALTH_API_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
      - uses: pnpm/action-setup@v6
        with:
          version: "11.7.0"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @daily-health/mobile exec expo install --check
      - run: pnpm --filter @daily-health/mobile typecheck
      - run: pnpm --filter @daily-health/mobile export:web
      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/mobile/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
