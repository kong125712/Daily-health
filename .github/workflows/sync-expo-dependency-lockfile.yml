name: Sync Expo dependency lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"

      - uses: pnpm/action-setup@v6
        with:
          version: "11.7.0"

      - name: Resolve the Expo-compatible dependency versions
        run: |
          pnpm install --no-frozen-lockfile
          pnpm --filter @daily-health/mobile exec expo install --fix
          pnpm install --no-frozen-lockfile
          pnpm --filter @daily-health/mobile exec expo install --check

      - name: Commit the synchronized lockfile
        run: |
          if git diff --quiet -- apps/mobile/package.json pnpm-lock.yaml; then
            echo "Expo dependencies are already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/package.json pnpm-lock.yaml
          git commit -m "chore: sync Expo dependency lockfile"
          git push origin "HEAD:${{ github.ref_name }}"
