name: Android APK Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v2.0.1
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      prerelease:
        description: Mark the GitHub Release as a pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name }}
      RELEASE_NAME: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
      - uses: pnpm/action-setup@v6
        with:
          version: "11.7.0"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - name: Install dependencies
        # The committed lockfile is reviewed before CI; avoid rechecking release ages.
        run: pnpm install --config.trustLockfile=true --frozen-lockfile
      - name: Check Expo dependency compatibility
        run: pnpm --filter @daily-health/mobile exec expo install --check
      - name: Assert safe mobile startup source
        run: |
          if test -e apps/mobile/src/auth/status.native.ts || test -e apps/mobile/src/auth/status.web.ts; then
            echo "::error::Platform persistence files must not shadow the auth/status data module."
            exit 1
          fi
          if grep -R -nE 'SecureStore\.getItem\(' apps/mobile; then
            echo "::error::Mobile startup must not use the unavailable synchronous SecureStore API."
            exit 1
          fi
          if grep -nE 'globalThis\.crypto|randomUUID' apps/mobile/src/auth/status.ts apps/mobile/src/data/LocalAdapter.ts; then
            echo "::error::Mobile IDs must not depend on a platform crypto polyfill."
            exit 1
          fi
          grep -F 'export function localStatus' apps/mobile/src/auth/status.ts
          grep -F 'createLocalSelection(localStatus())' apps/mobile/src/state/AppProvider.tsx
          if grep -F 'useState(() => resolveAdapter' apps/mobile/src/state/AppProvider.tsx; then
            echo "::error::AppProvider must not initialize a platform adapter during its first render."
            exit 1
          fi
      - name: Inject tag version
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";
          const tag = process.env.RELEASE_TAG ?? "";
          const version = tag.replace(/^v/, "");
          if (!version) throw new Error("Release tag must contain a version.");
          const path = "apps/mobile/app.json";
          const app = JSON.parse(await readFile(path, "utf8"));
          app.expo.version = version;
          app.expo.android.versionCode = Number(process.env.GITHUB_RUN_NUMBER);
          await writeFile(path, `${JSON.stringify(app, null, 2)}\n`);
          NODE
      - name: Type-check and export JavaScript bundles
        run: |
          pnpm --filter @daily-health/mobile typecheck
          pnpm --filter @daily-health/mobile export:web
          pnpm --filter @daily-health/mobile exec expo export --platform android
      - name: Prebuild and assemble APKs
        run: |
          pnpm --filter @daily-health/mobile prebuild:android
          cd apps/mobile/android
          sed -i 's/gradle-9\.3\.1-bin/gradle-8.14.3-bin/' gradle/wrapper/gradle-wrapper.properties
          sed -i -E 's/^org\.gradle\.jvmargs=.*/org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8/' gradle.properties
          ./gradlew --version
          ./gradlew assembleDebug assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon
      - name: Verify Android artifacts
        run: |
          AAPT="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 -name aapt | sort -V | tail -n1)"
          expected_name="${RELEASE_TAG#v}"
          expected_code="$GITHUB_RUN_NUMBER"
          for apk in apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk apps/mobile/android/app/build/outputs/apk/release/app-release.apk; do
            test -f "$apk"
            if unzip -l "$apk" | grep -E -i 'capacitor|nodejs|libnode\.so|query_engine|prisma'; then
              echo "::error::$apk contains a removed embedded-server artifact."
              exit 1
            fi
            badging="$($AAPT dump badging "$apk")"
            echo "$badging" | grep -F "versionName='$expected_name'"
            echo "$badging" | grep -F "versionCode='$expected_code'"
            echo "$badging" | grep -F "native-code: 'arm64-v8a'"
            if unzip -l "$apk" | grep -E 'lib/(armeabi-v7a|x86|x86_64)/'; then
              echo "::error::$apk contains an unintended non-ARM64 native library."
              exit 1
            fi
            if [ "$(stat -c%s "$apk")" -ge 200000000 ]; then
              echo "::error::$apk exceeds the 200 MB size budget."
              exit 1
            fi
          done
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk
