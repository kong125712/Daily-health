name: Android APK Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v2.0.1
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      prerelease:
        description: Mark the GitHub Release as a pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name }}
      RELEASE_NAME: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: "11.7.0"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Inject tag version
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";
          const tag = process.env.RELEASE_TAG ?? "";
          const version = tag.replace(/^v/, "");
          if (!version) throw new Error("Release tag must contain a version.");
          const path = "apps/mobile/app.json";
          const app = JSON.parse(await readFile(path, "utf8"));
          app.expo.version = version;
          app.expo.android.versionCode = Number(process.env.GITHUB_RUN_NUMBER);
          await writeFile(path, `${JSON.stringify(app, null, 2)}\n`);
          NODE
      - name: Type-check and export JavaScript bundles
        run: |
          pnpm --filter @daily-health/mobile typecheck
          pnpm --filter @daily-health/mobile export:web
          pnpm --filter @daily-health/mobile exec expo export --platform android
      - name: Prebuild and assemble APKs
        run: |
          pnpm --filter @daily-health/mobile prebuild:android
          cd apps/mobile/android
          ./gradlew assembleDebug assembleRelease
      - name: Verify Android artifacts
        run: |
          AAPT="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 -name aapt | sort -V | tail -n1)"
          expected_name="${RELEASE_TAG#v}"
          expected_code="$GITHUB_RUN_NUMBER"
          for apk in apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk apps/mobile/android/app/build/outputs/apk/release/app-release.apk; do
            test -f "$apk"
            if unzip -l "$apk" | rg -i 'capacitor|nodejs|libnode\.so|query_engine|prisma'; then
              echo "::error::$apk contains a removed embedded-server artifact."
              exit 1
            fi
            badging="$($AAPT dump badging "$apk")"
            echo "$badging" | rg -F "versionName='$expected_name'"
            echo "$badging" | rg -F "versionCode='$expected_code'"
          done
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk
