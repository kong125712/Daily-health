name: Android APK Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create, for example v1.0.1"
        required: true
        type: string
      release_name:
        description: "Optional release title. Defaults to the tag."
        required: false
        type: string
      prerelease:
        description: "Mark this GitHub Release as a pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  owner-check:
    name: Owner-only guard
    runs-on: ubuntu-latest
    steps:
      - name: Allow only repository owner
        if: ${{ github.actor != github.repository_owner }}
        run: |
          echo "::error::Only the repository owner can manually trigger APK releases."
          exit 1
      - name: Owner confirmed
        run: echo "Release triggered by repository owner ${{ github.actor }}."

  build-and-release:
    name: Build APKs and publish Release
    needs: owner-check
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "file:./daily-health.db"
      RELEASE_TAG: ${{ inputs.tag_name }}
      RELEASE_NAME: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag_name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.7.0"

      - name: Configure pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1" "ndk;27.2.12479018"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create CI environment files
        run: |
          cat > .env.local <<'EOF'
          DATABASE_URL="file:./daily-health.db"
          AI_PROVIDER=
          OPENAI_API_KEY=
          GEMINI_API_KEY=
          EPICURE_MCP_URL=
          EOF
          cat > database/.env <<'EOF'
          DATABASE_URL="file:./daily-health.db"
          EOF

      - name: Lint
        run: pnpm exec eslint . --ext .ts,.tsx --max-warnings=0

      - name: Build web app
        run: pnpm run build

      - name: Prepare embedded mobile server
        run: pnpm run mobile:prepare

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Prepare release signing
        env:
          ANDROID_KEYSTORE_BASE64_SECRET: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_SECRET: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS_SECRET: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD_SECRET: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p "$RUNNER_TEMP/android-signing"

          if [[ -n "$ANDROID_KEYSTORE_BASE64_SECRET" || -n "$ANDROID_KEYSTORE_PASSWORD_SECRET" || -n "$ANDROID_KEY_ALIAS_SECRET" || -n "$ANDROID_KEY_PASSWORD_SECRET" ]]; then
            if [[ -z "$ANDROID_KEYSTORE_BASE64_SECRET" || -z "$ANDROID_KEYSTORE_PASSWORD_SECRET" || -z "$ANDROID_KEY_ALIAS_SECRET" ]]; then
              echo "::error::Set ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, and ANDROID_KEY_ALIAS together. ANDROID_KEY_PASSWORD is optional."
              exit 1
            fi

            echo "$ANDROID_KEYSTORE_BASE64_SECRET" | base64 --decode > "$RUNNER_TEMP/android-signing/release.keystore"
            {
              echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/android-signing/release.keystore"
              echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD_SECRET"
              echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS_SECRET"
              echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD_SECRET:-$ANDROID_KEYSTORE_PASSWORD_SECRET}"
              echo "ANDROID_SIGNING_MODE=secret-keystore"
            } >> "$GITHUB_ENV"
          else
            keytool -genkeypair \
              -v \
              -keystore "$RUNNER_TEMP/android-signing/release.keystore" \
              -storepass "dailyhealth-ci-release" \
              -keypass "dailyhealth-ci-release" \
              -alias "dailyhealth-ci" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Daily Health CI, OU=CI, O=Daily Health, L=CI, S=CI, C=US"

            {
              echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/android-signing/release.keystore"
              echo "ANDROID_KEYSTORE_PASSWORD=dailyhealth-ci-release"
              echo "ANDROID_KEY_ALIAS=dailyhealth-ci"
              echo "ANDROID_KEY_PASSWORD=dailyhealth-ci-release"
              echo "ANDROID_SIGNING_MODE=temporary-ci-keystore"
            } >> "$GITHUB_ENV"
          fi

      - name: Build debug and release APKs
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android assembleDebug assembleRelease

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk "release-artifacts/DailyHealth-debug-${RELEASE_TAG}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "release-artifacts/DailyHealth-release-${RELEASE_TAG}.apk"
          git archive --format=zip --output "release-artifacts/DailyHealth-source-code-${RELEASE_TAG}.zip" HEAD

          if [[ "$ANDROID_SIGNING_MODE" == "temporary-ci-keystore" ]]; then
            cat > release-artifacts/SIGNING-NOTE.txt <<'EOF'
          The release APK was signed with a temporary CI-generated keystore because no Android signing secrets were configured.
          It is installable, but future release APKs signed with a different key may not upgrade this build in place.

          For stable production signing, add these repository secrets:
          - ANDROID_KEYSTORE_BASE64
          - ANDROID_KEYSTORE_PASSWORD
          - ANDROID_KEY_ALIAS
          - ANDROID_KEY_PASSWORD optional, defaults to ANDROID_KEYSTORE_PASSWORD
          EOF
          fi

          (cd release-artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release-artifacts/*
