name: Expo Android Verify

on:
  workflow_dispatch:
  push:
    branches: [main, expo-migration]
    paths:
      - "apps/mobile/**"
      - "server/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/expo-android-verify.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "server/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/expo-android-verify.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_DOCTOR: "1"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"

      - uses: pnpm/action-setup@v6
        with:
          version: "11.7.0"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Expo dependency compatibility
        run: pnpm --filter @daily-health/mobile exec expo install --check

      - name: Assert safe mobile startup source
        run: |
          if test -e apps/mobile/src/auth/status.native.ts || test -e apps/mobile/src/auth/status.web.ts; then
            echo "::error::Platform persistence files must not shadow the auth/status data module."
            exit 1
          fi
          if grep -R -nE 'SecureStore\.getItem\(' apps/mobile; then
            echo "::error::Mobile startup must not use the unavailable synchronous SecureStore API."
            exit 1
          fi
          if grep -nE 'globalThis\.crypto|randomUUID' apps/mobile/src/auth/status.ts apps/mobile/src/data/LocalAdapter.ts; then
            echo "::error::Mobile IDs must not depend on a platform crypto polyfill."
            exit 1
          fi
          grep -F 'export function localStatus' apps/mobile/src/auth/status.ts
          grep -F 'createLocalSelection(localStatus())' apps/mobile/src/state/AppProvider.tsx
          if grep -F 'useState(() => resolveAdapter' apps/mobile/src/state/AppProvider.tsx; then
            echo "::error::AppProvider must not initialize a platform adapter during its first render."
            exit 1
          fi

      - name: Type-check and bundle web/native JavaScript
        run: |
          pnpm --filter @daily-health/mobile typecheck
          pnpm --filter @daily-health/server typecheck
          pnpm --filter @daily-health/mobile export:web
          pnpm --filter @daily-health/mobile exec expo export --platform android

      - name: Generate and build Expo Android app
        run: |
          pnpm --filter @daily-health/mobile prebuild:android
          cd apps/mobile/android
          sed -i 's/gradle-9\.3\.1-bin/gradle-8.14.3-bin/' gradle/wrapper/gradle-wrapper.properties
          sed -i -E 's/^org\.gradle\.jvmargs=.*/org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8/' gradle.properties
          ./gradlew --version
          ./gradlew assembleDebug -PreactNativeArchitectures=x86_64 --no-daemon

      - name: Assert the APK has no embedded server stack
        run: |
          apk="apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$apk"
          if unzip -l "$apk" | grep -E -i 'capacitor|nodejs|libnode\.so|query_engine|prisma'; then
            echo "::error::Expo APK still contains an embedded Node/Capacitor/Prisma artifact."
            exit 1
          fi
          unzip -l "$apk" | grep -F 'lib/x86_64/'
          if unzip -l "$apk" | grep -E 'lib/(armeabi-v7a|arm64-v8a|x86)/'; then
            echo "::error::Verify APK contains an unintended native library ABI."
            exit 1
          fi
          if [ "$(stat -c%s "$apk")" -ge 200000000 ]; then
            echo "::error::Verify APK exceeds the 200 MB size budget."
            exit 1
          fi

      # GitHub's Ubuntu runners expose KVM but require this permission rule.
      # Without it the Android system image may time out before the test script runs.
      - name: Enable KVM for the Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cold-start the APK on an Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-linux-hw-accel: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect
          # android-emulator-runner executes each literal line in its own shell.
          # Use a folded scalar so the installation and assertions share one shell.
          script: >-
            adb install -r apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk;
            adb logcat -c;
            adb shell am force-stop com.dailyhealth.mobile;
            adb shell monkey -p com.dailyhealth.mobile 1 >/dev/null;
            app_pid='';
            for _ in $(seq 1 60); do app_pid="$(adb shell pidof com.dailyhealth.mobile 2>/dev/null | tr -d '\r')"; if [ -n "$app_pid" ]; then break; fi; sleep 1; done;
            if [ -z "$app_pid" ]; then echo '::error::Daily Health did not create an Android process within 60 seconds.'; adb shell dumpsys activity activities | grep -A 12 -B 4 com.dailyhealth.mobile || true; adb logcat -d -v threadtime; exit 1; fi;
            echo "Daily Health process started with PID $app_pid.";
            sleep 5;
            if ! adb shell pidof com.dailyhealth.mobile | tr -d '\r' | grep -q '[0-9]'; then echo '::error::Daily Health process exited during startup.'; adb logcat -d -v threadtime; exit 1; fi;
            adb logcat -d -v threadtime | tee /tmp/daily-health-logcat.txt;
            if grep -A 40 -B 5 -F 'Process: com.dailyhealth.mobile' /tmp/daily-health-logcat.txt | grep -E 'FATAL EXCEPTION|SecureStore.*not implemented|undefined is not a function'; then exit 1; fi
